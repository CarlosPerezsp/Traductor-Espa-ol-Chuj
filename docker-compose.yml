services:
  db:
    image: mysql:8.0
    container_name: almg-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - almg_db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - almg-net

  backend:
    build: ./backend
    container_name: almg-backend
    ports:
      - "8001:8000"
    volumes:
      - ./media:/app/media
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - almg-net

  frontend:
    build: ./frontend
    container_name: almg-frontend
    ports:
      - "80:80"
    volumes:
      - ./media:/usr/share/nginx/html/media:ro
    depends_on:
      - backend
    networks:
      - almg-net

networks:
  almg-net:
    driver: bridge

volumes:
  almg_db_data:
